openapi: 3.0.3
info:
  version: 1.0.0
  title: Counterfact Black Box Test API
  description: >
    A minimal OpenAPI spec used exclusively by the black-box test suite.
    Each response has exactly one example so that the generated route handlers
    return predictable, assertable values via $.response[200].random().
paths:
  /ping:
    get:
      summary: Health check
      operationId: ping
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: string
              examples:
                pong:
                  value: pong

  /items:
    get:
      summary: Return a fixed list of items
      operationId: listItems
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              examples:
                fruit:
                  value:
                    - apple
                    - banana
                    - cherry

  "/path/with:colon":
    get:
      summary: Test that paths containing a colon are routed correctly
      operationId: pathWithColon
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: string
              examples:
                colon:
                  value: colon handled

  /binary-file:
    get:
      summary: Returns binary data
      operationId: binaryFile
      responses:
        "200":
          description: Binary file response
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
