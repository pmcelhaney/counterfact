name: Manual acceptance tests

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  manual-acceptance-tests:
    name: Validate manual acceptance tests
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python <<'PY'
          import os
          import re
          import sys

          body = os.environ.get("PR_BODY") or ""

          if not body.strip():
              print("PR body is empty.")
              sys.exit(1)

          # Find the exact section and capture content until the next ## heading or end of file.
          match = re.search(
              r"(?ms)^## Manual acceptance tests\s*\n(.*?)(?=^## |\Z)",
              body,
          )

          if not match:
              print('Missing required section: "## Manual acceptance tests"')
              sys.exit(1)

          section = match.group(1)

          unchecked = re.findall(r"(?m)^\s*-\s\[\s\]\s+.+$", section)
          checked = re.findall(r"(?m)^\s*-\s\[x\]\s+.+$", section, flags=re.IGNORECASE)

          if checked:
              print("Manual acceptance test boxes must be left unchecked for the human reviewer.")
              sys.exit(1)

          if len(unchecked) < 3:
              print(f"Expected at least 3 unchecked manual acceptance test boxes, found {len(unchecked)}.")
              sys.exit(1)

          if len(unchecked) > 6:
              print(f"Expected at most 6 unchecked manual acceptance test boxes, found {len(unchecked)}.")
              sys.exit(1)

          print(f"OK: found {len(unchecked)} unchecked manual acceptance test boxes.")
          PY
