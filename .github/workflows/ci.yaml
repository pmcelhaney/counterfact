name: CI Checks

on:
  pull_request:
    branches:
      - main
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  ci-checks:
    name: CI Checks
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Debug
        run: echo "${{ matrix.os }}"
      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect docs-only pull request
        id: docs-only
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files=$(git diff --name-only HEAD^1 HEAD^2)

          if [[ -z "$changed_files" ]]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s\n' "$changed_files" | grep -vqE '\.md$'; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip heavy checks for docs-only changes
        if: steps.docs-only.outputs.docs_only == 'true'
        run: echo "Markdown-only pull request detected. Skipping lint/type/tests while keeping required checks green."
      - uses: actions/setup-node@v6
        if: steps.docs-only.outputs.docs_only != 'true'
        with:
          node-version: lts/*
          cache: yarn
        id: setup-node
      - name: Get Node Version
        if: steps.docs-only.outputs.docs_only != 'true'
        run: echo "version=$(node -v)" >> $GITHUB_OUTPUT
        id: node-version
      - name: Cache node_modules
        if: steps.docs-only.outputs.docs_only != 'true'
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ steps.node-version.outputs.version }}-${{ hashFiles('**/yarn.lock') }}
      - name: Install Packages
        if: steps.docs-only.outputs.docs_only != 'true'
        run: yarn install --frozen-lockfile --network-timeout 100000
      - name: Patch packages
        if: steps.docs-only.outputs.docs_only != 'true'
        run: yarn patch-package
      - name: ESlint
        if: steps.docs-only.outputs.docs_only != 'true' && matrix.os != 'windows-latest'
        run: yarn eslint -f github-annotations .
      - name: TypeScript
        if: steps.docs-only.outputs.docs_only != 'true' && matrix.os != 'windows-latest'
        run: yarn tsc --noEmit
      - name: Unit Tests
        if: steps.docs-only.outputs.docs_only != 'true'
        timeout-minutes: 2
        run: yarn test --runInBand --forceExit --verbose --no-watchman
      - name: Set up Python
        if: steps.docs-only.outputs.docs_only != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install Python dependencies
        if: steps.docs-only.outputs.docs_only != 'true'
        run: pip install -r test-black-box/requirements.txt
      - name: Black Box Tests
        if: steps.docs-only.outputs.docs_only != 'true'
        timeout-minutes: 5
        run: yarn test:black-box
      - name: Type Tests
        if: steps.docs-only.outputs.docs_only != 'true'
        timeout-minutes: 2
        run: yarn build && yarn test:tsd
