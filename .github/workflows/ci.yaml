name: CI Checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  filter:
    name: Check Changed Files
    runs-on: ubuntu-latest
    outputs:
      non-docs: ${{ steps.check.outputs.non-docs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect non-docs changes
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "non-docs=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          NON_DOCS=$(echo "$CHANGED_FILES" | grep -vE '\.md$' | grep -v '^$')
          if [ -n "$NON_DOCS" ]; then
            echo "non-docs=true" >> $GITHUB_OUTPUT
          else
            echo "non-docs=false" >> $GITHUB_OUTPUT
          fi

  ci-checks:
    name: CI Checks
    needs: filter
    if: needs.filter.outputs.non-docs == 'true'
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Debug
        run: echo "${{ matrix.os }}"
      - name: Check Out Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: yarn
        id: setup-node
      - name: Get Node Version
        run: echo "version=$(node -v)" >> $GITHUB_OUTPUT
        id: node-version
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ steps.node-version.outputs.version }}-${{ hashFiles('**/yarn.lock') }}
      - name: Install Packages
        run: yarn install --frozen-lockfile --network-timeout 100000
      - name: Patch packages
        run: yarn patch-package
      - name: ESlint
        if: matrix.os != 'windows-latest'
        run: yarn eslint -f github-annotations .
      - name: TypeScript
        if: matrix.os != 'windows-latest'
        run: yarn tsc --noEmit
      - name: Unit Tests
        timeout-minutes: 2
        run: yarn test --runInBand --forceExit --verbose --no-watchman
      - name: Black Box Tests
        timeout-minutes: 2
        run: yarn test:black-box --runInBand --forceExit --verbose --no-watchman --no-coverage
